# Build host code for the benchmark machine's CPU. Also satisfies silverfir-nano's
# x64 JIT, which requires SSSE3+SSE4.1 (not in the default x86_64 target). Scoped per
# host arch so it never reaches the wasm32 test-case builds.

[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=native"]

[target.'cfg(target_arch = "aarch64")']
rustflags = ["-C", "target-cpu=native"]
